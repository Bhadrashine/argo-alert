# ── Prometheus ────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 6h
    resources:
      requests:
        memory: 400Mi
        cpu: 200m
      limits:
        memory: 800Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# ── Grafana ───────────────────────────────────────
grafana:
  adminPassword: admin123
  resources:
    requests:
      memory: 100Mi
      cpu: 50m
  service:
    type: NodePort
    nodePort: 30090

# ── AlertManager ──────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 50Mi
        cpu: 20m
  service:
    type: NodePort
    nodePort: 30092
  config:

    # ── Global SMTP Settings ───────────────────────
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'bhadrashine@gmail.com'
      smtp_auth_username: 'bhadrashine@gmail.com'
      smtp_auth_password: 'gmnd gkhv ypko yubq'
      smtp_require_tls: true

    # ── Routing Rules ──────────────────────────────
    route:
      group_by: ['alertname', 'app']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'email-alert'
      routes:
        - match:
            severity: critical
          receiver: 'email-alert'
          group_wait: 10s
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: 'email-alert'
          repeat_interval: 4h

    # ── Receivers ─────────────────────────────────
    receivers:
      - name: 'email-alert'
        email_configs:
          - to: 'youremail@gmail.com'
            send_resolved: true
            headers:
              subject: >-
                [{{ .Status | toUpper }}] ArgoCD Alert - {{ .GroupLabels.alertname }}
            html: |
              <h2>ArgoCD Alert Notification</h2>
              <p><b>Status:</b> {{ .Status | toUpper }}</p>
              {{ range .Alerts }}
              <hr>
              <p><b>Alert:</b> {{ .Annotations.summary }}</p>
              <p><b>Description:</b> {{ .Annotations.description }}</p>
              <p><b>Severity:</b> {{ .Labels.severity }}</p>
              <p><b>App Name:</b> {{ .Labels.name }}</p>
              <p><b>Health Status:</b> {{ .Labels.health_status }}</p>
              <p><b>Sync Status:</b> {{ .Labels.sync_status }}</p>
              <p><b>Started:</b> {{ .StartsAt }}</p>
              {{ end }}

    # ── Inhibition Rules ───────────────────────────
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['app', 'alertname']

# ── Disabled Components (saves resources) ─────────
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
nodeExporter:
  enabled: true

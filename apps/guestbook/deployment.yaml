# ── Guestbook Deployment ──────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
    spec:
      containers:
        - name: guestbook
          image: gcr.io/google-samples/gb-frontend:v4
          ports:
            - containerPort: 80
---
# ── Guestbook Service ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: guestbook
  namespace: apps
spec:
  selector:
    app: guestbook
  ports:
    - port: 80
      targetPort: 80

# ── Nginx Deployment ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
---
# ── Nginx Service ─────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: apps
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
